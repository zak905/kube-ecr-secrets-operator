---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "kube-ecr-secrets-operator.name" . }}-cert-init
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "kube-ecr-secrets-operator.name" . }}-controller-manager
      securityContext:
        runAsNonRoot: false
      containers:
        - name: webhook-cert-init
          image: alpine:3.21
          command:
          - sh
          - -c
          - |
            set -e
            apk add --no-cache curl openssl > /dev/null 2>&1
            NAMESPACE=$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)
            CERT_DIR=/tmp/certs
            mkdir -p "$CERT_DIR"
            openssl genrsa -out /tmp/ca.key 2048
            openssl req -new -x509 -days 36500 -key /tmp/ca.key -out /tmp/ca.crt -subj "/CN=kube-ecr-secrets-operator-ca"
            openssl genrsa -out "$CERT_DIR/tls.key" 2048
            printf '[req]\nreq_extensions = v3_req\ndistinguished_name = req_distinguished_name\n[req_distinguished_name]\n[v3_req]\nbasicConstraints = CA:FALSE\nkeyUsage = digitalSignature, keyEncipherment\nsubjectAltName = @alt_names\n[alt_names]\n' > /tmp/san.cnf
            printf 'DNS.1 = %s.%s.svc\nDNS.2 = %s.%s.svc.cluster.local\n' "$SERVICE_NAME" "$NAMESPACE" "$SERVICE_NAME" "$NAMESPACE" >> /tmp/san.cnf
            openssl req -new -key "$CERT_DIR/tls.key" -out /tmp/server.csr -subj "/CN=kube-ecr-secrets-operator" -config /tmp/san.cnf
            openssl x509 -req -days 36500 -in /tmp/server.csr -CA /tmp/ca.crt -CAkey /tmp/ca.key -CAcreateserial -out "$CERT_DIR/tls.crt" -extensions v3_req -extfile /tmp/san.cnf
            TLS_CRT=$(base64 -w 0 "$CERT_DIR/tls.crt")
            TLS_KEY=$(base64 -w 0 "$CERT_DIR/tls.key")
            CA_BUNDLE=$(base64 -w 0 /tmp/ca.crt)
            TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
            K8S_CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
            APISERVER=https://kubernetes.default.svc
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --cacert "$K8S_CA" \
              -H "Authorization: Bearer $TOKEN" \
              "${APISERVER}/api/v1/namespaces/${NAMESPACE}/secrets/${SECRET_NAME}")
            if [ "$HTTP_STATUS" = "404" ]; then
              curl -sf -X POST \
                --cacert "$K8S_CA" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json" \
                "${APISERVER}/api/v1/namespaces/${NAMESPACE}/secrets" \
                -d "{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"${SECRET_NAME}\",\"namespace\":\"${NAMESPACE}\"},\"type\":\"kubernetes.io/tls\",\"data\":{\"tls.crt\":\"${TLS_CRT}\",\"tls.key\":\"${TLS_KEY}\"}}"
              curl -sf -X PATCH \
                --cacert "$K8S_CA" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/json-patch+json" \
                "${APISERVER}/apis/admissionregistration.k8s.io/v1/mutatingwebhookconfigurations/${WEBHOOK_CONFIG_NAME}" \
                -d "[{\"op\": \"add\", \"path\": \"/webhooks/0/clientConfig/caBundle\", \"value\": \"${CA_BUNDLE}\"}]"
              echo "Done: TLS certificate created/updated and webhook configuration patched."
              fi
              echo "Certificate exists. Nothting to do"
          env:
          - name: SERVICE_NAME
            value: {{ include "kube-ecr-secrets-operator.name" . }}-webhook-service
          - name: WEBHOOK_CONFIG_NAME
            value: {{ include "kube-ecr-secrets-operator.name" . }}-mutating-webhook-configuration
          - name: SECRET_NAME
            value: webhook-server-cert
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false
---
